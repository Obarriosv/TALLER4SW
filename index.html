<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Series</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background-color: #f8f9fa;
    }

    h1 {
      margin-bottom: 20px;
    }

    #detail-card .card {
      width: 100%;
    }

    #detail-card img {
      max-height: 500px;
      object-fit: cover;
    }

    tr {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container mt-4">
    <div class="row">
      <!-- Tabla a la izquierda -->
      <div class="col-md-6">
        <h1>Series</h1>

        <table class="table table-striped">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Channel</th>
              <th>Seasons</th>
            </tr>
          </thead>
          <tbody id="series-tbody"></tbody>
        </table>

        <div id="average" class="mt-2 fw-bold"></div>
      </div>

      <!-- Card a la derecha -->
      <div class="col-md-6">
        <div id="detail-card"></div>
      </div>
    </div>
  </div>

  <script type="module" src="./scripts/main.js"></script>
</body>
</html>
